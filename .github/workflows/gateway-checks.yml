name: Gateway checks

on:
  push:
    branches:
      - main
      - stage2-uwb-rf-proof

  pull_request:

  workflow_dispatch:

jobs:
  gateway-artifact-check:
    name: Gateway release checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Compile Python scripts
        run: python -m compileall scripts

      - name: Run Gateway artifact check
        run: python scripts/check_gateway_release_artifacts.py

      - name: Check OSHWA certification record
        run: python scripts/check_oshwa_readiness.py
